<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="utf-8"/>
<title>医療費・セルフメディケーション管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Helvetica Neue", sans-serif; background: #f0f4f8; color: #222; }

  header {
    background: #2d6abf;
    color: white;
    padding: 18px 24px;
    font-size: 18px;
    font-weight: bold;
  }

  .container { max-width: 900px; margin: 0 auto; padding: 20px; }

  .card {
    background: white;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .card h2 { font-size: 14px; color: #555; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; }

  .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 12px; color: #666; }
  .form-group input, .form-group select {
    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
  }
  .form-group input:focus, .form-group select:focus {
    outline: none;
    border-color: #2d6abf;
  }

  .btn-add {
    background: #2d6abf;
    color: white;
    border: none;
    padding: 9px 20px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    align-self: flex-end;
  }
  .btn-add:hover { background: #1e4f9c; }

  /* 年選択 */
  .year-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .year-row label { font-size: 14px; color: #444; }
  .year-row select { padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }

  /* テーブル */
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { background: #f0f4f8; padding: 10px 12px; text-align: left; font-size: 12px; color: #555; border-bottom: 2px solid #ddd; }
  td { padding: 10px 12px; border-bottom: 1px solid #eee; }
  tr:hover td { background: #f8faff; }
  tr.otc td { background: #eef5ff; }
  .btn-del {
    background: none;
    border: 1px solid #e74c3c;
    color: #e74c3c;
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .btn-del:hover { background: #e74c3c; color: white; }

  /* 集計 */
  .summary-totals { font-size: 15px; margin-bottom: 10px; line-height: 2; }
  .result-box {
    border-radius: 8px;
    padding: 14px 18px;
    margin-top: 10px;
    font-size: 15px;
  }
  .result-box.good { background: #e8f5e9; border-left: 4px solid #27ae60; }
  .result-box.warn { background: #fff8e1; border-left: 4px solid #f39c12; }
  .result-box.none { background: #f5f5f5; border-left: 4px solid #aaa; }
  .result-title { font-size: 16px; font-weight: bold; margin-bottom: 6px; }
  .result-note { font-size: 13px; color: #444; line-height: 1.7; white-space: pre-line; }

  .empty { color: #aaa; text-align: center; padding: 30px; }
</style>

<meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport"/>
<meta content="#2d6abf" name="theme-color"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="default" name="apple-mobile-web-app-status-bar-style"/>
<meta content="医療費管理" name="apple-mobile-web-app-title"/>
<link href="manifest.json" rel="manifest"/>
<link href="favicon.ico" rel="icon"/>
<link href="apple-touch-icon.png" rel="apple-touch-icon"/></head>
<body>
<header>医療費・セルフメディケーション税制　管理アプリ</header>
<div class="container">
<!-- 入力フォーム -->
<div class="card">
<h2>新しい記録を追加</h2>
<div class="form-row">
<div class="form-group">
<label>日付</label>
<input id="inp-date" type="date"/>
</div>
<div class="form-group" style="flex:1; min-width:160px;">
<label>名称（病院名・薬名など）</label>
<input id="inp-name" placeholder="例：〇〇病院、△△薬" type="text"/>
</div>
<div class="form-group">
<label>金額（円）</label>
<input id="inp-amount" placeholder="例：1500" style="width:120px;" type="number"/>
</div>
<div class="form-group" style="min-width:200px;">
<label>種類</label>
<select id="inp-type">
<option>診療・治療費</option>
<option>市販薬（セルフメディケーション対象）</option>
<option>処方薬</option>
</select>
</div>
<button class="btn-add" onclick="addRecord()">＋ 追加</button>
</div>
</div>
<!-- 一覧 -->
<div class="card">
<h2>記録一覧</h2>
<div class="year-row">
<label>表示する年：</label>
<select id="year-select" onchange="renderTable()"></select>
</div>
<div style="overflow-x:auto; margin-top:10px;">
<table>
<thead>
<tr>
<th>日付</th>
<th>名称</th>
<th style="text-align:right;">金額（円）</th>
<th>種類</th>
<th></th>
</tr>
</thead>
<tbody id="table-body">
<tr><td class="empty" colspan="5">記録がありません</td></tr>
</tbody>
</table>
</div>
</div>
<!-- 集計・判定 -->
<div class="card">
<h2>集計と判定</h2>
<div class="summary-totals" id="summary-totals">－</div>
<div class="result-box none" id="result-box">
<div class="result-title" id="result-title">記録を追加すると判定が表示されます</div>
<div class="result-note" id="result-note"></div>
</div>
</div>
</div>
<script>
// データをlocalStorageに保存
const STORAGE_KEY = "iryohi_records";

function loadRecords() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch(e) { return []; }
}

function saveRecords(records) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

// 今日の日付をセット
document.getElementById("inp-date").value = new Date().toISOString().slice(0, 10);

function getYear(dateStr) {
  return dateStr ? dateStr.split("-")[0] : "";
}

function getAllYears(records) {
  const years = [...new Set(records.map(r => getYear(r.date)).filter(y => {
    const n = parseInt(y);
    return !isNaN(n) && n >= 2000 && n <= 2100;
  }))].sort().reverse();
  const thisYear = String(new Date().getFullYear());
  if (!years.includes(thisYear)) years.unshift(thisYear);
  return years;
}

function cleanBadRecords() {
  const records = loadRecords().filter(r => {
    const y = parseInt(getYear(r.date));
    return !isNaN(y) && y >= 2000 && y <= 2100;
  });
  saveRecords(records);
}

function updateYearSelect() {
  const records = loadRecords();
  const years = getAllYears(records);
  const sel = document.getElementById("year-select");
  const current = sel.value;
  sel.innerHTML = years.map(y => `<option value="${y}">${y}年</option>`).join("");
  if (current && years.includes(current)) sel.value = current;
}

function addRecord() {
  const date = document.getElementById("inp-date").value;
  const name = document.getElementById("inp-name").value.trim();
  const amount = parseInt(document.getElementById("inp-amount").value);
  const type = document.getElementById("inp-type").value;

  if (!date || !name || isNaN(amount) || amount <= 0) {
    alert("日付・名称・金額をすべて入力してください。");
    return;
  }

  const records = loadRecords();
  records.push({ date, name, amount, type, id: Date.now() });
  saveRecords(records);

  // 追加した年を選択
  const year = getYear(date);
  updateYearSelect();
  if (year) document.getElementById("year-select").value = year;

  document.getElementById("inp-name").value = "";
  document.getElementById("inp-amount").value = "";
  renderTable();
}

function deleteRecord(id) {
  if (!confirm("この記録を削除しますか？")) return;
  const records = loadRecords().filter(r => r.id !== id);
  saveRecords(records);
  renderTable();
}

function renderTable() {
  const year = document.getElementById("year-select").value;
  const records = loadRecords().filter(r => getYear(r.date) === year);
  const tbody = document.getElementById("table-body");

  if (records.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" class="empty">この年の記録がありません</td></tr>`;
    updateSummary(0, 0);
    return;
  }

  // 日付順にソート
  records.sort((a, b) => a.date.localeCompare(b.date));

  let total = 0, otc = 0;
  tbody.innerHTML = records.map(r => {
    total += r.amount;
    const isOtc = r.type === "市販薬（セルフメディケーション対象）";
    if (isOtc) otc += r.amount;
    return `<tr class="${isOtc ? 'otc' : ''}">
      <td>${r.date}</td>
      <td>${r.name}</td>
      <td style="text-align:right;">${r.amount.toLocaleString()}</td>
      <td>${r.type}</td>
      <td><button class="btn-del" onclick="deleteRecord(${r.id})">削除</button></td>
    </tr>`;
  }).join("");

  updateSummary(total, otc);
}

function updateSummary(total, otc) {
  document.getElementById("summary-totals").innerHTML =
    `医療費合計（すべて）：<strong>${total.toLocaleString()} 円</strong><br>
     うち市販薬（セルフメディケーション対象）：<strong>${otc.toLocaleString()} 円</strong>`;

  const ika = Math.max(0, total - 100000);
  const self = Math.max(0, Math.min(otc - 12000, 88000));
  const box = document.getElementById("result-box");
  const title = document.getElementById("result-title");
  const note = document.getElementById("result-note");

  if (total === 0) {
    box.className = "result-box none";
    title.textContent = "記録を追加すると判定が表示されます";
    note.textContent = "";
    return;
  }

  if (ika === 0 && self === 0) {
    box.className = "result-box warn";
    title.textContent = "現時点では、どちらの税制も対象外です";
    note.textContent =
      `医療費控除：年間の医療費が10万円を超えると対象になります（現在 ${total.toLocaleString()}円）\n` +
      `セルフメディケーション税制：市販薬が1万2千円を超えると対象になります（現在 ${otc.toLocaleString()}円）`;
    return;
  }

  box.className = "result-box good";
  if (ika >= self) {
    title.textContent = `✅ 医療費控除 の方が有利です（控除額：約 ${ika.toLocaleString()} 円）`;
    note.textContent =
      `医療費控除：${total.toLocaleString()}円 − 10万円 ＝ ${ika.toLocaleString()}円 の控除\n` +
      `セルフメディケーション税制：市販薬${otc.toLocaleString()}円 − 1万2千円 ＝ ${self.toLocaleString()}円 の控除\n` +
      `※ どちらか一方しか使えません。金額の大きい「医療費控除」を選ぶと節税効果が高くなります。`;
  } else {
    title.textContent = `✅ セルフメディケーション税制 の方が有利です（控除額：約 ${self.toLocaleString()} 円）`;
    note.textContent =
      `セルフメディケーション税制：市販薬${otc.toLocaleString()}円 − 1万2千円 ＝ ${self.toLocaleString()}円 の控除\n` +
      `医療費控除：${total.toLocaleString()}円 − 10万円 ＝ ${ika.toLocaleString()}円 の控除\n` +
      `※ どちらか一方しか使えません。\n※ セルフメディケーション税制は健康診断・予防接種などを受けた年が対象です。`;
  }
}

// 初期表示（おかしなデータを除去してから表示）
cleanBadRecords();
updateYearSelect();
renderTable();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js');
  });
}
</script></body>
</html>
